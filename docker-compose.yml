# Hermes Workspace + Hermes Agent
#
# This compose stack follows the upstream hermes-workspace example, with two
# security tweaks for self-hosting:
#   1. the Hermes gateway is kept on the internal Docker network only
#   2. the workspace binds to loopback by default
#
# For Tailscale, the safest pattern is:
#   - keep WORKSPACE_BIND=127.0.0.1
#   - expose the workspace via Tailscale Serve / Funnel or a private proxy
#
# If you intentionally want LAN/Tailscale clients to hit the container port
# directly, set WORKSPACE_BIND=0.0.0.0 and make sure HERMES_PASSWORD is strong.

services:
  hermes-agent:
    image: nousresearch/hermes-agent:latest
    restart: unless-stopped
    command: ["gateway", "run"]
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      OPENCODE_GO_API_KEY: ${OPENCODE_GO_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: ${API_SERVER_HOST:-0.0.0.0}
      API_SERVER_KEY: ${API_SERVER_KEY:?Set API_SERVER_KEY in .env}
    volumes:
      - ${HERMES_DATA_PATH:-/mnt/vol/hermes}:/opt/data
    expose:
      - "8642"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8642/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  hermes-dashboard:
    image: nousresearch/hermes-agent:latest
    restart: unless-stopped
    command: ["dashboard", "--host", "0.0.0.0", "--no-open"]
    depends_on:
      hermes-agent:
        condition: service_healthy
    volumes:
      - ${HERMES_DATA_PATH:-/mnt/vol/hermes}:/opt/data
    expose:
      - "9119"
    ports:
      - "127.0.0.1:9119:9119"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9119/api/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  hermes-workspace:
    image: ghcr.io/outsourc-e/hermes-workspace:latest
    restart: unless-stopped
    depends_on:
      hermes-agent:
        condition: service_healthy
      hermes-dashboard:
        condition: service_healthy
    environment:
      HERMES_API_URL: http://hermes-agent:8642
      HERMES_DASHBOARD_URL: http://hermes-dashboard:9119
      HERMES_API_TOKEN: ${API_SERVER_KEY:?Set API_SERVER_KEY in .env}
      HERMES_PASSWORD: ${HERMES_PASSWORD:?Set HERMES_PASSWORD in .env}
      COOKIE_SECURE: ${COOKIE_SECURE:-0}
      TRUST_PROXY: ${TRUST_PROXY:-0}
    ports:
      - "${WORKSPACE_BIND:-127.0.0.1}:${WORKSPACE_PORT:-3000}:3000"

